


<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRP - Giriş Yap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --deep-rose: #A66B74;
            --soft-pink: #FADADD;
            --text-color: #4A3437;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }


        .bg-image {
            
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('/images/arkafoto.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            filter: blur(3px); 
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            color: white;
        }

        .flower-icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }

        h3 {
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 12px 20px;
            color: white !important;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

            .form-control::placeholder {
                color: rgba(255, 255, 255, 0.7);
            }

            .form-control:focus {
                background: rgba(255, 255, 255, 0.2);
                border-color: var(--soft-pink);
                box-shadow: 0 0 15px rgba(250, 218, 221, 0.3);
                outline: none;
            }

        .btn-login {
            background: linear-gradient(135deg, #D98994 0%, #A66B74 100%);
            border: none;
            border-radius: 15px;
            padding: 12px;
            font-weight: 700;
            color: white;
            width: 100%;
            margin-top: 10px;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(166, 107, 116, 0.4);
        }

            .btn-login:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 25px rgba(166, 107, 116, 0.6);
                background: linear-gradient(135deg, #A66B74 0%, #D98994 100%);
            }

        .footer-text {
            margin-top: 25px;
            font-size: 0.85rem;
            opacity: 0.9;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="login-container">
        <div class="login-card">
            <span class="flower-icon">🌸</span>
            <h3>LRP SİSTEMİ</h3>

            <div class="mb-3 text-start">
                <input type="text" id="username" class="form-control" placeholder="Kullanıcı Adı">
            </div>

            <div class="mb-3 text-start">
                <input type="password" id="password" class="form-control" placeholder="Şifre">
            </div>

            <button onclick="handleLogin()" class="btn btn-login">Giriş Yap</button>

            <div class="footer-text">
                Medine Sarımustafaoğlu &copy; 2026
            </div>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const user = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            if (!user.username || !user.password) {
                alert("Lütfen tüm alanları doldurun!");
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(user)
                });

                if (response.ok) {
                    const data = await response.json();
                    sessionStorage.setItem('user', JSON.stringify(data));
                    window.location.href = data.redirect || data.Redirect;
                } else {
                    alert("Kullanıcı adı veya şifre hatalı!");
                }
            } catch (error) {
                console.error("Giriş Hatası:", error);
                alert("Sunucuya bağlanılamadı!");
            }
        }

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
